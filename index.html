<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 연속 재생 플레이어</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0c0c0d; color: #f4f4f5; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        .glass-panel { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; }
        .player-card { background: #111113; border-radius: 1.5rem; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.03); }
        .input-field { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; }
        .playlist-item { border-radius: 1rem; transition: all 0.2s; border: 1px solid transparent; }
        .playlist-item.active { background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.3); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-5xl space-y-6">
        <div class="flex justify-between items-center px-4">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🎧</span>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-white">YouTube Continuous Player</h1>
                    <p class="text-zinc-500 text-xs mt-0.5">방송실 전용 무광고 모드 [Stable Proxy]</p>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-zinc-900/50 px-3 py-1.5 rounded-full border border-zinc-800">
                <span id="status-dot" class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                <span id="status-text" class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Track 1 / 1</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            
            <div class="lg:col-span-4 glass-panel p-6 h-[520px] flex flex-col">
                <h2 class="text-sm font-bold flex items-center gap-2 mb-5">
                    <span class="w-1.5 h-1.5 bg-blue-500 rounded-full"></span> 재생 목록 
                    <span id="count-badge" class="ml-auto text-[10px] text-zinc-500">0곡</span>
                </h2>
                
                <div class="space-y-2 mb-6">
                    <input id="add-title" type="text" placeholder="제목 (비워두면 자동)" class="w-full input-field p-3 text-xs text-zinc-300 focus:outline-none focus:ring-1 focus:ring-blue-500/50">
                    <div class="flex gap-2">
                        <input id="add-url" type="text" placeholder="YouTube URL 또는 ID" class="flex-1 input-field p-3 text-xs text-zinc-300 focus:outline-none focus:ring-1 focus:ring-blue-500/50">
                        <button onclick="addVideo()" class="px-4 bg-white text-black text-xs font-bold rounded-lg hover:bg-zinc-200 transition">추가</button>
                    </div>
                </div>

                <div id="playlist-container" class="flex-grow overflow-y-auto custom-scroll space-y-2 pr-1">
                    </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="player-card aspect-video shadow-2xl relative bg-black">
                    <iframe id="main-player" class="w-full h-full" src="" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
                </div>
                
                <div class="glass-panel px-8 py-4 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="auto-next" checked class="sr-only peer">
                            <div class="w-10 h-5 bg-zinc-800 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-zinc-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                            <span class="ml-3 text-xs font-medium text-zinc-400 uppercase tracking-tighter">자동 재생</span>
                        </label>
                    </div>
                    
                    <div class="flex items-center gap-3">
                        <button onclick="playPrev()" class="px-6 py-2 rounded-xl bg-zinc-800/50 hover:bg-zinc-800 text-xs font-bold transition">이전 곡</button>
                        <button id="play-btn" onclick="togglePlay()" class="px-10 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold transition shadow-lg shadow-blue-900/20">일시정지</button>
                        <button onclick="playNext()" class="px-6 py-2 rounded-xl bg-zinc-800/50 hover:bg-zinc-800 text-xs font-bold transition">다음 곡</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let playlist = [];
        let currentIndex = -1;
        let isPlaying = false;
        let elapsedSec = 0;
        const proxies = ['https://inv.tux.rs/embed/', 'https://yt.cdaut.de/embed/', 'https://invidious.nerdvpn.de/embed/'];

        function addVideo() {
            const u = document.getElementById('add-url').value.trim();
            const t = document.getElementById('add-title').value.trim();
            const id = u.match(/(?:v=|be\/|embed\/)([^& \n?]+)/)?.[1] || (u.length === 11 ? u : null);
            if (!id) return;
            playlist.push({ id, title: t || `Track ${playlist.length + 1}` });
            document.getElementById('add-url').value = ""; document.getElementById('add-title').value = "";
            render(); if (currentIndex === -1) load(0);
        }

        function render() {
            const c = document.getElementById('playlist-container');
            document.getElementById('count-badge').innerText = `${playlist.length}곡`;
            c.innerHTML = playlist.map((item, i) => `
                <div onclick="load(${i})" class="playlist-item p-4 cursor-pointer ${i === currentIndex ? 'active' : 'hover:bg-zinc-800/30'}">
                    <div class="text-xs font-bold ${i === currentIndex ? 'text-blue-400' : 'text-zinc-300'} truncate">${item.title}</div>
                    <div class="text-[10px] text-zinc-600 font-mono mt-1">${item.id}</div>
                </div>`).join('');
        }

        function load(i, s = 0) {
            if (i < 0 || i >= playlist.length) return;
            currentIndex = i; elapsedSec = s; isPlaying = true;
            document.getElementById('main-player').src = `${proxies[0]}${playlist[i].id}?autoplay=1&start=${s}&modestbranding=1`;
            document.getElementById('status-text').innerText = `Track ${i + 1} / ${playlist.length}`;
            document.getElementById('play-btn').innerText = "일시정지";
            render();
        }

        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (isPlaying) { isPlaying = false; btn.innerText = "재생"; document.getElementById('main-player').src = ""; }
            else { load(currentIndex, elapsedSec); }
        }

        function playNext() { if (playlist.length) load((currentIndex + 1) % playlist.length); }
        function playPrev() { if (playlist.length) load((currentIndex - 1 + playlist.length) % playlist.length); }
        setInterval(() => { if(isPlaying) elapsedSec++; }, 1000);
    </script>
</body>
</html>
